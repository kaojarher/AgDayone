<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Flash Agent</title>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        :root {
            --gemini-blue: #4285f4;
            --bg-dark: #1a1a1a;
            --chat-bg: #2d2d2d;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            background: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        input[type="password"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            flex-grow: 1;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg { padding: 12px 18px; border-radius: 12px; max-width: 85%; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--gemini-blue); color: white; }
        .ai { align-self: flex-start; background: var(--chat-bg); border: 1px solid #444; }
        .footer {
            padding: 20px;
            background: #252525;
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
        }
        button {
            background: var(--gemini-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <strong>Gemini Agent</strong>
    <input type="password" id="api-key" placeholder="在此貼上你的 Google API Key">
</header>

<div id="chat-window">
    <div class="msg ai">準備就緒。請輸入 API Key 並開始對話！</div>
</div>

<div class="footer">
    <input type="text" id="user-input" placeholder="問點什麼吧..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()">發送</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let chatSession = null;

    window.sendMessage = async function() {
        const keyInput = document.getElementById('api-key');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatWindow = document.getElementById('chat-window');

        const apiKey = keyInput.value.trim();
        const text = userInput.value.trim();

        if (!apiKey) return alert("請輸入 API Key！");
        if (!text) return;

        // 顯示使用者訊息
        appendMessage('user', text);
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            // 初始化 SDK
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });

            // 執行生成 (參考你提供的範例邏輯)
            const result = await model.generateContent(text);
            const response = await result.response;
            const responseText = response.text();

            appendMessage('ai', responseText);
        } catch (error) {
            console.error(error);
            appendMessage('ai', "發生錯誤: " + error.message);
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
